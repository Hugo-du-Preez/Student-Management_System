{% extends "base.html" %}
{% block title %}Students - SMS{% endblock %}
{% block content %}
<div>
    <h2>Students</h2>
    <div class="row mb-4">
        <div class="col-md-6">
            <form method="POST" action="/add_student" class="row g-3">
                <div class="col-md-4">
                    <input type="text" class="form-control" name="fname" placeholder="First Name" required>
                </div>
                <div class="col-md-4">
                    <input type="text" class="form-control" name="lname" placeholder="Last Name" required>
                </div>
                <div class="col-md-3">
                    <input type="number" class="form-control" name="snumber" placeholder="SNumber" required>
                </div>
                <div class="col-md-1">
                    <button type="submit" class="btn btn-success">Add</button>
                </div>
            </form>
        </div>
    </div>
    <div class="table-responsive">
        <table class="table table-dark table-striped table-hover">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>First Name</th>
                    <th>Last Name</th>
                    <th>SNumber</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for student in students %}
                <tr>
                    <td>{{ student[0] }}</td>
                    <td>{{ student[1] }}</td>
                    <td>{{ student[2] }}</td>
                    <td>{{ student[3] }}</td>
                    <td>
                        <a href="/delete_student/{{ student[0] }}" class="btn btn-danger btn-sm" onclick="return confirm('Delete?')">Delete</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
